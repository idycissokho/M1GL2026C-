version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: m1gl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Endtoend
      POSTGRES_DB: Dbmemoire
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Dbmemoire"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: